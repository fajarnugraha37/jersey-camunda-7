services:
  postgres:
    image: postgres:18.3-alpine
    container_name: sentinel-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sentinel-minio
    hostname: minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sentinel-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - sentinel-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9000/minio/health/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-09-07T16-13-09Z
    container_name: sentinel-minio-init
    hostname: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-sentinel-secret}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-sentinel-evidence}
    volumes:
      - ./deployment/minio/init/create-bucket.sh:/init/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init/create-bucket.sh"]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: sentinel-keycloak
    hostname: keycloak
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./deployment/keycloak/realm/sentinel-realm.json:/opt/keycloak/data/import/sentinel-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9000'"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-app
    hostname: app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sentinel}
      DB_USERNAME: ${POSTGRES_USER:-sentinel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-sentinel-secret}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-sentinel-evidence}
      EVIDENCE_UPLOAD_URL_TTL: ${EVIDENCE_UPLOAD_URL_TTL:-PT15M}
      EVIDENCE_DOWNLOAD_URL_TTL: ${EVIDENCE_DOWNLOAD_URL_TTL:-PT10M}
      KEYCLOAK_ISSUER: http://localhost:${KEYCLOAK_PORT:-8081}/realms/sentinel
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-sentinel-api}
      KEYCLOAK_JWKS_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8081}/realms/sentinel/protocol/openid-connect/certs
      WORKFLOW_ENGINE_NAME: ${WORKFLOW_ENGINE_NAME:-sentinel-workflow-engine}
      WORKFLOW_INVESTIGATION_ESCALATION_DURATION: ${WORKFLOW_INVESTIGATION_ESCALATION_DURATION:-PT30M}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sentinel-postgres-data:
  sentinel-minio-data:
