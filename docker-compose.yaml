services:
  postgres:
    image: postgres:18.3-alpine
    container_name: sentinel-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.8.1
    container_name: sentinel-kafka
    hostname: kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.2.7-alpine
    container_name: sentinel-redis
    hostname: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sentinel-minio
    hostname: minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sentinel-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - sentinel-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: sentinel-minio-init
    hostname: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-sentinel-secret}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-sentinel-evidence}
    volumes:
      - ./deployment/minio/init/create-bucket.sh:/init/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init/create-bucket.sh"]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: sentinel-keycloak
    hostname: keycloak
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./deployment/keycloak/realm/sentinel-realm.json:/opt/keycloak/data/import/sentinel-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9000'"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  mailpit:
    image: axllent/mailpit:latest
    container_name: sentinel-mailpit
    hostname: mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8025/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-app
    hostname: app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sentinel}
      DB_USERNAME: ${POSTGRES_USER:-sentinel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAILPIT_SMTP_HOST: mailpit
      MAILPIT_SMTP_PORT: 1025
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-sentinel@local.test}
      NOTIFICATION_TO_EMAIL: ${NOTIFICATION_TO_EMAIL:-ops@local.test}
      APP_INSTANCE_ID: ${APP_INSTANCE_ID:-app-1}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-PT2S}
      OUTBOX_LEASE_DURATION: ${OUTBOX_LEASE_DURATION:-PT30S}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      NOTIFICATION_CONSUMER_GROUP_ID: ${NOTIFICATION_CONSUMER_GROUP_ID:-sentinel-notification-consumer}
      NOTIFICATION_MAX_RETRIES: ${NOTIFICATION_MAX_RETRIES:-3}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sentinel}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-sentinel-secret}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-sentinel-evidence}
      EVIDENCE_UPLOAD_URL_TTL: ${EVIDENCE_UPLOAD_URL_TTL:-PT15M}
      EVIDENCE_DOWNLOAD_URL_TTL: ${EVIDENCE_DOWNLOAD_URL_TTL:-PT10M}
      KEYCLOAK_ISSUER: http://localhost:${KEYCLOAK_PORT:-8081}/realms/sentinel
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-sentinel-api}
      KEYCLOAK_JWKS_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8081}/realms/sentinel/protocol/openid-connect/certs
      WORKFLOW_ENGINE_NAME: ${WORKFLOW_ENGINE_NAME:-sentinel-workflow-engine}
      WORKFLOW_INVESTIGATION_ESCALATION_DURATION: ${WORKFLOW_INVESTIGATION_ESCALATION_DURATION:-PT30M}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sentinel-postgres-data:
  sentinel-minio-data:
