services:
  postgres:
    image: postgres:18.3-alpine
    container_name: sentinel-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-app
    hostname: app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sentinel}
      DB_USERNAME: ${POSTGRES_USER:-sentinel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sentinel-postgres-data:
