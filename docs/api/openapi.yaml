openapi: 3.0.3
info:
  title: Sentinel Enforcement Platform API
  version: 0.1.0
  description: Phase 0-5 vertical slice for health, report intake, authorization, case lifecycle, workflow, and storage-backed evidence intake.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - health
      responses:
        '200':
          description: Application and database are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/reports:
    post:
      operationId: createReport
      tags:
        - reports
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to create the report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{reportId}:
    get:
      operationId: getReport
      tags:
        - reports
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{reportId}/triage:
    post:
      operationId: triageReport
      tags:
        - reports
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriageReportRequest'
      responses:
        '200':
          description: Report triaged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to triage the report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Report cannot be triaged in its current state or version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases:
    post:
      operationId: createCase
      tags:
        - cases
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to create the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Request conflicts with current case state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listCases
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque cursor returned by the previous page for the same filter and sort scope.
        - in: query
          name: q
          schema:
            type: string
          description: Quick search keyword matched across case number, title, summary, assignment, and creator fields.
        - in: query
          name: searchField
          schema:
            $ref: '#/components/schemas/CaseListSearchField'
          description: Target a single searchable case field. Must be paired with `searchValue`.
        - in: query
          name: searchValue
          schema:
            type: string
          description: Keyword used with `searchField` for single-field matching.
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CaseStatusValue'
        - in: query
          name: assignedUnitId
          schema:
            type: string
        - in: query
          name: assigneeUserId
          schema:
            type: string
        - in: query
          name: createdBy
          schema:
            type: string
        - in: query
          name: reportId
          schema:
            type: string
            format: uuid
        - in: query
          name: sortBy
          schema:
            $ref: '#/components/schemas/CaseListSortBy'
          description: Defaults to `CREATED_AT`.
        - in: query
          name: sortDirection
          schema:
            $ref: '#/components/schemas/SortDirection'
          description: Defaults to `DESC`.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Case page loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '400':
          description: Invalid pagination request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to list cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{caseId}:
    get:
      operationId: getCase
