openapi: 3.0.3
info:
  title: Sentinel Enforcement Platform API
  version: 0.1.0
  description: Foundation vertical slice for health, report intake, and case lifecycle.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - health
      responses:
        '200':
          description: Application and database are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/reports:
    post:
      operationId: createReport
      tags:
        - reports
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to create the report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{reportId}:
    get:
      operationId: getReport
      tags:
        - reports
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases:
    post:
      operationId: createCase
      tags:
        - cases
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to create the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Request conflicts with current case state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listCases
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque cursor returned by the previous page for the same filter and sort scope.
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Quick search keyword matched across case number, title, summary, assignment, and creator fields.
        - in: query
          name: searchField
          required: false
          schema:
            $ref: '#/components/schemas/CaseListSearchField'
          description: Target a single searchable case field. Must be paired with `searchValue`.
        - in: query
          name: searchValue
          required: false
          schema:
            type: string
          description: Keyword used with `searchField` for single-field matching.
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/CaseStatusValue'
        - in: query
          name: assignedUnitId
          required: false
          schema:
            type: string
        - in: query
          name: assigneeUserId
          required: false
          schema:
            type: string
        - in: query
          name: createdBy
          required: false
          schema:
            type: string
        - in: query
          name: reportId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: sortBy
          required: false
          schema:
            $ref: '#/components/schemas/CaseListSortBy'
          description: Defaults to `CREATED_AT`.
        - in: query
          name: sortDirection
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
          description: Defaults to `DESC`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Case page loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '400':
          description: Invalid pagination request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to list cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{caseId}:
    get:
      operationId: getCase
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Case found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to read the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{caseId}/assignments:
    post:
      operationId: assignCase
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCaseRequest'
      responses:
        '200':
          description: Case assignment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to assign the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Request conflicts with current case state or version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{caseId}/transitions:
    post:
      operationId: transitionCase
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCaseRequest'
      responses:
        '200':
          description: Case transitioned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to transition the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Request conflicts with current case state or version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{caseId}/audit-events:
    get:
      operationId: getCaseAuditEvents
      tags:
        - cases
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque cursor returned by the previous page for the same filter and sort scope.
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Quick search keyword matched across event type, action, actor, result, reason, resource, and correlation fields.
        - in: query
          name: searchField
          required: false
          schema:
            $ref: '#/components/schemas/AuditEventListSearchField'
          description: Target a single searchable audit field. Must be paired with `searchValue`.
        - in: query
          name: searchValue
          required: false
          schema:
            type: string
          description: Keyword used with `searchField` for single-field matching.
        - in: query
          name: actorId
          required: false
          schema:
            type: string
        - in: query
          name: eventType
          required: false
          schema:
            type: string
        - in: query
          name: action
          required: false
          schema:
            type: string
        - in: query
          name: result
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          required: false
          schema:
            $ref: '#/components/schemas/AuditEventListSortBy'
          description: Defaults to `TIMESTAMP`.
        - in: query
          name: sortDirection
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
          description: Defaults to `DESC`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Audit events loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseAuditEventListResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to read case audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks:
    get:
      operationId: listTasks
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque cursor returned by the previous page for the same filter and sort scope.
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Quick search keyword matched across task name, task definition key, case number, case title, assignee, and jurisdiction fields.
        - in: query
          name: searchField
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowTaskSearchField'
          description: Target a single searchable task field. Must be paired with `searchValue`.
        - in: query
          name: searchValue
          required: false
          schema:
            type: string
          description: Keyword used with `searchField` for single-field matching.
        - in: query
          name: caseId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: assigneeUserId
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowTaskStateValue'
        - in: query
          name: sortBy
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowTaskSortBy'
          description: Defaults to `CREATED_AT`.
        - in: query
          name: sortDirection
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
          description: Defaults to `DESC`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Workflow task page loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTaskListResponse'
        '400':
          description: Invalid pagination request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to list tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{taskId}/claim:
    post:
      operationId: claimTask
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow task claimed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTaskResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to claim the task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Workflow task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Workflow task is already claimed or no longer claimable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{taskId}/complete:
    post:
      operationId: completeTask
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Workflow task completed or already completed by an earlier identical request.
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to complete the task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Workflow task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Workflow task cannot be completed in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/workflow-reconciliation:
    get:
      operationId: listWorkflowReconciliationIssues
      tags:
        - workflow-reconciliation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque cursor returned by the previous page for the same filter and sort scope.
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Quick search keyword matched across case number, case title, issue type, process instance id, and jurisdiction fields.
        - in: query
          name: searchField
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowReconciliationSearchField'
          description: Target a single searchable reconciliation field. Must be paired with `searchValue`.
        - in: query
          name: searchValue
          required: false
          schema:
            type: string
          description: Keyword used with `searchField` for single-field matching.
        - in: query
          name: issueType
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowReconciliationIssueTypeValue'
        - in: query
          name: caseStatus
          required: false
          schema:
            $ref: '#/components/schemas/CaseStatusValue'
        - in: query
          name: workflowCorrelationStatus
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowCorrelationStatusValue'
        - in: query
          name: sortBy
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowReconciliationSortBy'
          description: Defaults to `CASE_UPDATED_AT`.
        - in: query
          name: sortDirection
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
          description: Defaults to `DESC`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Workflow reconciliation issues loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowReconciliationIssueListResponse'
        '400':
          description: Invalid pagination request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to inspect workflow reconciliation issues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/workflow-reconciliation/{caseId}/actions:
    post:
      operationId: reconcileWorkflowCase
      tags:
        - workflow-reconciliation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileWorkflowRequest'
      responses:
        '200':
          description: Workflow reconciliation action completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowReconciliationActionResponse'
        '401':
          description: Request is unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated actor is not allowed to reconcile workflow state for the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Workflow mismatch cannot be auto-repaired in the current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateReportRequest:
      type: object
      required:
        - title
        - description
        - jurisdictionCode
        - reporterName
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
          maxLength: 4000
        jurisdictionCode:
          type: string
          minLength: 1
          maxLength: 16
        reporterName:
          type: string
          minLength: 1
          maxLength: 100
    ReportResponse:
      type: object
      required:
        - id
        - title
        - description
        - jurisdictionCode
        - reporterName
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - version
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        jurisdictionCode:
          type: string
        reporterName:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        version:
          type: integer
          format: int64
    CreateCaseRequest:
      type: object
      required:
        - reportId
        - title
        - summary
      properties:
        reportId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 200
        summary:
          type: string
          minLength: 1
          maxLength: 4000
    AssignCaseRequest:
      type: object
      required:
        - assignedUnitId
        - assigneeUserId
        - expectedVersion
        - reason
      properties:
        assignedUnitId:
          type: string
          minLength: 1
          maxLength: 64
        assigneeUserId:
          type: string
          minLength: 1
          maxLength: 100
        expectedVersion:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          minLength: 1
          maxLength: 500
    TransitionCaseRequest:
      type: object
      required:
        - targetStatus
        - expectedVersion
        - reason
      properties:
        targetStatus:
          $ref: '#/components/schemas/CaseStatusValue'
        expectedVersion:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          minLength: 1
          maxLength: 500
    CaseStatusValue:
      type: string
      enum:
        - CREATED
        - UNDER_TRIAGE
        - UNDER_INVESTIGATION
        - PENDING_REVIEW
        - PENDING_DECISION
        - DECIDED
        - UNDER_APPEAL
        - ENFORCEMENT_IN_PROGRESS
        - CLOSED
        - CANCELLED
    CaseResponse:
      type: object
      required:
        - id
        - caseNumber
        - reportId
        - title
        - summary
        - jurisdictionCode
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - version
      properties:
        id:
          type: string
          format: uuid
        caseNumber:
          type: string
        reportId:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        jurisdictionCode:
          type: string
        status:
          $ref: '#/components/schemas/CaseStatusValue'
        assignedUnitId:
          type: string
          nullable: true
        assigneeUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        version:
          type: integer
          format: int64
    CaseListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CaseResponse'
        nextCursor:
          type: string
          nullable: true
    CaseListSearchField:
      type: string
      enum:
        - CASE_NUMBER
        - TITLE
        - SUMMARY
        - ASSIGNED_UNIT_ID
        - ASSIGNEE_USER_ID
        - CREATED_BY
    CaseListSortBy:
      type: string
      enum:
        - CREATED_AT
        - UPDATED_AT
        - CASE_NUMBER
        - TITLE
        - STATUS
    AuditEventListSearchField:
      type: string
      enum:
        - EVENT_TYPE
        - ACTION
        - ACTOR_ID
        - RESULT
        - REASON
        - RESOURCE_TYPE
        - RESOURCE_ID
        - CORRELATION_ID
    AuditEventListSortBy:
      type: string
      enum:
        - TIMESTAMP
        - EVENT_TYPE
        - ACTION
        - RESULT
        - ACTOR_ID
    SortDirection:
      type: string
      enum:
        - ASC
        - DESC
    CaseAuditEventResponse:
      type: object
      required:
        - eventId
        - eventType
        - actorType
        - actorId
        - actorRoles
        - action
        - resourceType
        - resourceId
        - caseId
        - timestamp
        - correlationId
