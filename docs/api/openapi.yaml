components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateReportRequest:
      type: object
      required:
        - title
        - description
        - jurisdictionCode
        - reporterName
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
          maxLength: 4000
        jurisdictionCode:
          type: string
          minLength: 1
          maxLength: 16
        reporterName:
          type: string
          minLength: 1
          maxLength: 100
    TriageReportRequest:
      type: object
      required:
        - expectedVersion
        - reason
      properties:
        expectedVersion:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          minLength: 1
          maxLength: 500
    ReportResponse:
      type: object
      required:
        - id
        - title
        - description
        - jurisdictionCode
        - reporterName
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - version
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        jurisdictionCode:
          type: string
        reporterName:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        version:
          type: integer
          format: int64
    EvidenceClassificationValue:
      type: string
      enum:
        - PUBLIC
        - CONFIDENTIAL
        - SECRET
    EvidenceStorageStatusValue:
      type: string
      enum:
        - PENDING_UPLOAD
        - ACTIVE
    CreateEvidenceUploadSessionRequest:
      type: object
      required:
        - title
        - classification
        - originalFilename
        - mediaType
        - sizeBytes
        - sha256Checksum
