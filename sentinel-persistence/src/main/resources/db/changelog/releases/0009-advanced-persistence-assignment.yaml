databaseChangeLog:
  - changeSet:
      id: 0009-case-assignment-active-rotation
      author: codex
      changes:
        - addColumn:
            tableName: case_assignment
            columns:
              - column:
                  name: released_at
                  type: TIMESTAMPTZ
              - column:
                  name: released_by
                  type: VARCHAR(100)
              - column:
                  name: superseded_by_assignment_id
                  type: UUID
              - column:
                  name: is_active
                  type: BOOLEAN
              - column:
                  name: active_case_id
                  type: UUID
        - sql:
            splitStatements: false
            stripComments: false
            sql: |
              WITH ordered_assignments AS (
                  SELECT
                      id,
                      ROW_NUMBER() OVER (
                          PARTITION BY case_id
                          ORDER BY assigned_at DESC, created_at DESC, id DESC
                      ) AS reverse_rank,
                      LEAD(id) OVER (
                          PARTITION BY case_id
                          ORDER BY assigned_at, created_at, id
                      ) AS next_assignment_id,
                      LEAD(assigned_at) OVER (
                          PARTITION BY case_id
                          ORDER BY assigned_at, created_at, id
                      ) AS next_assigned_at,
                      LEAD(assigned_by) OVER (
                          PARTITION BY case_id
                          ORDER BY assigned_at, created_at, id
                      ) AS next_assigned_by
                  FROM case_assignment
              )
              UPDATE case_assignment assignment_row
              SET
                  is_active = ordered_assignments.reverse_rank = 1,
                  active_case_id = CASE
                      WHEN ordered_assignments.reverse_rank = 1 THEN assignment_row.case_id
                      ELSE NULL
                  END,
                  released_at = CASE
                      WHEN ordered_assignments.reverse_rank = 1 THEN NULL
                      ELSE ordered_assignments.next_assigned_at
                  END,
                  released_by = CASE
                      WHEN ordered_assignments.reverse_rank = 1 THEN NULL
                      ELSE ordered_assignments.next_assigned_by
                  END,
                  superseded_by_assignment_id = CASE
                      WHEN ordered_assignments.reverse_rank = 1 THEN NULL
                      ELSE ordered_assignments.next_assignment_id
                  END
              FROM ordered_assignments
              WHERE assignment_row.id = ordered_assignments.id;
        - addNotNullConstraint:
            tableName: case_assignment
            columnName: is_active
            columnDataType: BOOLEAN
        - addDefaultValue:
            tableName: case_assignment
            columnName: is_active
            defaultValueBoolean: true
        - sql:
            sql: |
              ALTER TABLE case_assignment
                ADD CONSTRAINT ck_case_assignment_release_state
                  CHECK (
                    (is_active = TRUE
                      AND active_case_id = case_id
                      AND released_at IS NULL
                      AND released_by IS NULL
                      AND superseded_by_assignment_id IS NULL)
                    OR
                    (is_active = FALSE
                      AND active_case_id IS NULL
                      AND released_at IS NOT NULL
                      AND released_by IS NOT NULL)
                  );
        - createIndex:
            tableName: case_assignment
            indexName: idx_case_assignment_active_case_lookup
            columns:
              - column:
                  name: active_case_id
        - sql:
            sql: |
              ALTER TABLE case_assignment
                ADD CONSTRAINT uk_case_assignment_active_case
                  UNIQUE (active_case_id)
                  DEFERRABLE INITIALLY IMMEDIATE;
      rollback:
        - sql:
            sql: ALTER TABLE case_assignment DROP CONSTRAINT IF EXISTS uk_case_assignment_active_case;
        - dropIndex:
            tableName: case_assignment
            indexName: idx_case_assignment_active_case_lookup
        - sql:
            sql: ALTER TABLE case_assignment DROP CONSTRAINT IF EXISTS ck_case_assignment_release_state;
        - dropDefaultValue:
            tableName: case_assignment
            columnName: is_active
        - dropNotNullConstraint:
            tableName: case_assignment
            columnName: is_active
            columnDataType: BOOLEAN
        - dropColumn:
            tableName: case_assignment
            columnName: is_active
        - dropColumn:
            tableName: case_assignment
            columnName: active_case_id
        - dropColumn:
            tableName: case_assignment
            columnName: superseded_by_assignment_id
        - dropColumn:
            tableName: case_assignment
            columnName: released_by
        - dropColumn:
            tableName: case_assignment
            columnName: released_at
