databaseChangeLog:
  - changeSet:
      id: 0006-workflow-instance-types
      author: codex
      changes:
        - sql:
            sql: |
              ALTER TABLE workflow_instance
                ADD COLUMN workflow_type VARCHAR(32) DEFAULT 'CASE_MAIN' NOT NULL;
              ALTER TABLE workflow_instance
                DROP CONSTRAINT IF EXISTS workflow_instance_pkey;
              ALTER TABLE workflow_instance
                ADD CONSTRAINT workflow_instance_pkey PRIMARY KEY (case_id, workflow_type);
              ALTER TABLE workflow_instance
                ADD CONSTRAINT ck_workflow_instance_type
                  CHECK (workflow_type IN ('CASE_MAIN', 'APPEAL'));
      rollback:
        - sql:
            sql: |
              ALTER TABLE workflow_instance DROP CONSTRAINT IF EXISTS ck_workflow_instance_type;
              ALTER TABLE workflow_instance DROP CONSTRAINT IF EXISTS workflow_instance_pkey;
              ALTER TABLE workflow_instance ADD CONSTRAINT workflow_instance_pkey PRIMARY KEY (case_id);
              ALTER TABLE workflow_instance DROP COLUMN IF EXISTS workflow_type;
  - changeSet:
      id: 0006-recommendation
      author: codex
      changes:
        - createTable:
            tableName: recommendation
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: case_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_recommendation_case
                    references: case_record(id)
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: summary
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: proposed_decision
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: proposed_sanction
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: submitted_at
                  type: TIMESTAMPTZ
              - column:
                  name: submitted_by
                  type: VARCHAR(100)
              - column:
                  name: approved_review_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: |
              ALTER TABLE recommendation
                ADD CONSTRAINT ck_recommendation_status
                  CHECK (status IN ('DRAFT', 'SUBMITTED', 'APPROVED')),
                ADD CONSTRAINT ck_recommendation_version_non_negative
                  CHECK (version >= 0);
        - createTable:
            tableName: recommendation_review
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recommendation_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_recommendation_review_recommendation
                    references: recommendation(id)
              - column:
                  name: outcome
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: review_summary
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: reviewed_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: reviewed_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: |
              ALTER TABLE recommendation_review
                ADD CONSTRAINT ck_recommendation_review_outcome
                  CHECK (outcome IN ('APPROVED')),
                ADD CONSTRAINT ck_recommendation_review_version_non_negative
                  CHECK (version >= 0);
      rollback:
        - dropTable:
            tableName: recommendation_review
        - dropTable:
            tableName: recommendation
