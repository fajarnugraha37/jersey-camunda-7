databaseChangeLog:
  - changeSet:
      id: 0002-case-number-sequence
      author: codex
      changes:
        - createTable:
            tableName: case_number_sequence
            columns:
              - column:
                  name: jurisdiction_code
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: calendar_year
                  type: INTEGER
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: next_value
                  type: BIGINT
                  constraints:
                    nullable: false
        - sql:
            splitStatements: false
            stripComments: false
            sql: |
              CREATE OR REPLACE FUNCTION generate_case_number(
                  p_jurisdiction_code VARCHAR,
                  p_case_type VARCHAR,
                  p_calendar_year INTEGER
              )
              RETURNS VARCHAR
              LANGUAGE plpgsql
              AS '
              DECLARE
                  v_sequence BIGINT;
              BEGIN
                  INSERT INTO case_number_sequence (jurisdiction_code, calendar_year, next_value)
                  VALUES (p_jurisdiction_code, p_calendar_year, 1)
                  ON CONFLICT (jurisdiction_code, calendar_year)
                  DO UPDATE
                    SET next_value = case_number_sequence.next_value + 1
                  RETURNING next_value INTO v_sequence;

                  RETURN p_jurisdiction_code
                      || ''-''
                      || p_case_type
                      || ''-''
                      || p_calendar_year
                      || ''-''
                      || LPAD(v_sequence::TEXT, 8, ''0'');
              END;
              ';
      rollback:
        - sql:
            sql: DROP FUNCTION IF EXISTS generate_case_number(VARCHAR, VARCHAR, INTEGER);
        - dropTable:
            tableName: case_number_sequence
  - changeSet:
      id: 0002-case-foundation
      author: codex
      changes:
        - createTable:
            tableName: case_record
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: case_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: report_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_case_record_report
                    references: report(id)
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: summary
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: jurisdiction_code
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_unit_id
                  type: VARCHAR(64)
              - column:
                  name: assignee_user_id
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: |
              ALTER TABLE case_record
                ADD CONSTRAINT ck_case_record_status
                  CHECK (status IN (
                    'CREATED',
                    'UNDER_TRIAGE',
                    'UNDER_INVESTIGATION',
                    'PENDING_REVIEW',
                    'PENDING_DECISION',
                    'DECIDED',
                    'UNDER_APPEAL',
                    'ENFORCEMENT_IN_PROGRESS',
                    'CLOSED',
                    'CANCELLED'
                  )),
                ADD CONSTRAINT ck_case_record_version_non_negative CHECK (version >= 0);
        - createIndex:
            tableName: case_record
            indexName: idx_case_record_jurisdiction_status_created_at
            columns:
              - column:
                  name: jurisdiction_code
              - column:
                  name: status
              - column:
                  name: created_at
        - createIndex:
            tableName: case_record
            indexName: idx_case_record_assignee_created_at
            columns:
              - column:
                  name: assignee_user_id
              - column:
                  name: created_at
        - createTable:
            tableName: case_assignment
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: case_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_case_assignment_case
                    references: case_record(id)
              - column:
                  name: assigned_unit_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: assignee_user_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: assignment_reason
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: assigned_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE case_assignment ADD CONSTRAINT ck_case_assignment_version_non_negative CHECK (version >= 0);
        - createIndex:
            tableName: case_assignment
            indexName: idx_case_assignment_case_assigned_at
            columns:
              - column:
                  name: case_id
              - column:
                  name: assigned_at
        - createTable:
            tableName: case_status_history
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: case_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_case_status_history_case
                    references: case_record(id)
              - column:
                  name: from_status
                  type: VARCHAR(32)
              - column:
                  name: to_status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: transition_reason
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: transitioned_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: transitioned_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: case_status_history
            indexName: idx_case_status_history_case_transitioned_at
            columns:
              - column:
                  name: case_id
              - column:
                  name: transitioned_at
        - createTable:
            tableName: audit_event
            columns:
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: actor_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: actor_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: actor_roles
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: resource_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: case_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_audit_event_case
                    references: case_record(id)
              - column:
                  name: timestamp
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: correlation_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: source_ip
                  type: VARCHAR(128)
              - column:
                  name: result
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: VARCHAR(500)
              - column:
                  name: before_summary
                  type: TEXT
              - column:
                  name: after_summary
                  type: TEXT
              - column:
                  name: metadata
                  type: TEXT
                  defaultValue: ''
                  constraints:
                    nullable: false
        - createIndex:
            tableName: audit_event
            indexName: idx_audit_event_case_timestamp
            columns:
              - column:
                  name: case_id
              - column:
                  name: timestamp
      rollback:
        - dropTable:
            tableName: audit_event
        - dropTable:
            tableName: case_status_history
        - sql:
            sql: ALTER TABLE case_assignment DROP CONSTRAINT IF EXISTS ck_case_assignment_version_non_negative;
        - dropTable:
            tableName: case_assignment
        - sql:
            sql: |
              ALTER TABLE case_record
                DROP CONSTRAINT IF EXISTS ck_case_record_status,
                DROP CONSTRAINT IF EXISTS ck_case_record_version_non_negative;
        - dropTable:
            tableName: case_record
